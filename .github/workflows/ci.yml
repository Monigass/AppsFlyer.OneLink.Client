name: Build and Publish NuGet Package

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AppsFlyer.OneLink.Client.sln

      - name: Build
        run: dotnet build AppsFlyer.OneLink.Client.sln --configuration Release --no-restore /p:GeneratePackageOnBuild=false

      - name: Set package version
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith('refs/tags/v')) {
            $version = "${{ github.ref_name }}".TrimStart('v')
            "PACKAGE_VERSION_ARG=-p:PackageVersion=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          }
          else {
            $latestTag = git tag --sort=-version:refname | Where-Object { $_ -match '^v\d+(\.\d+){2}$' } | Select-Object -First 1
            $baseVersion = if ($latestTag) { $latestTag.TrimStart('v') } else { '1.0.0' }
            $parts = $baseVersion.Split('.')
            $parts[2] = ([int]$parts[2] + 1).ToString()
            $version = "$($parts -join '.')" + "-preview.${{ github.run_number }}"
            "PACKAGE_VERSION_ARG=-p:PackageVersion=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Pack
        if: github.event_name == 'push'
        shell: pwsh
        run: dotnet pack src/AppsFlyer.OneLink.Client/AppsFlyer.OneLink.Client.csproj --configuration Release --no-build --output ./artifacts $env:PACKAGE_VERSION_ARG

      - name: NuGet login (OIDC → temp API key)
        if: github.event_name == 'push'
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          Get-ChildItem ./artifacts -Filter *.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --skip-duplicate
          }
      - name: Publish to GitHub Packages
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          Get-ChildItem ./artifacts -Filter *.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
              --api-key "${{ secrets.GITHUB_TOKEN }}" `
              --skip-duplicate
          }
