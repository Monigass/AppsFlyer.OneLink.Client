name: Build and Publish NuGet Package

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AppsFlyer.OneLink.Client.sln

      - name: Build
        run: dotnet build AppsFlyer.OneLink.Client.sln --configuration Release --no-restore

      - name: Pack
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet pack src/AppsFlyer.OneLink.Client/AppsFlyer.OneLink.Client.csproj --configuration Release --no-build --output ./artifacts

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate
